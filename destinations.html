<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Interstellar Agency</title>
    <meta name="keywords" content="space travel, interstellar travel, space tourism, exoplanets, black holes, nebulas, spaceships, space packages, Orion Apex, Interstellar Agency">
    <meta name="author" content="Interstellar Agency (Orion Apex)">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Interstellar Agency">
    <meta property="og:title" content="Destinations | Interstellar Agency">
    <meta property="og:description" content="Explore 90 interstellar destinations across nebulas, stars, satellites, planets and black holes.">
    <meta property="og:image" content="assets/images/journey01.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Destinations | Interstellar Agency">
    <meta name="twitter:description" content="Explore 90 interstellar destinations across nebulas, stars, satellites, planets and black holes.">
    <meta name="description" content="Explore 90 interstellar destinations across nebulas, stars, satellites, planets and black holes.">

    <!-- Theme + reveal: apply saved theme before paint; reveal body after JS builds header (or after 2s safety). -->
    <script>(function(){try{if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');}catch(e){}setTimeout(function(){document.documentElement.classList.add('app-ready');},2000);})();</script>
    <style>html:not(.app-ready) body{visibility:hidden}</style>
    <noscript><style>html body{visibility:visible!important}</style></noscript>

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <!-- Header injected by app.js -->

    <main id="main-content">
        <section class="section-block">
            <div class="container">

                <div class="explorer-head">
                    <div class="explorer-intro">
                        <h1>Destinations Explorer</h1>
                        <p>
                            Browse structured destination records for premium interstellar travel.
                            Use the filter categories or the search box to narrow destination types
                            and compare route requirements.
                        </p>
                    </div>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Search destinations…"
                               aria-label="Search destinations">
                    </div>
                </div>

                <div class="filter-bar" id="filter-bar">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="Nebulas">Nebulas</button>
                    <button class="filter-btn" data-category="Stars">Stars</button>
                    <button class="filter-btn" data-category="Natural Satellites">Natural Satellites</button>
                    <button class="filter-btn" data-category="Non-Habitable Planets">Non-Habitable Planets</button>
                    <button class="filter-btn" data-category="Habitable Planets">Habitable Planets</button>
                    <button class="filter-btn" data-category="Black Holes">Black Holes</button>
                </div>

                <div class="results-bar">
                    <span id="results-count"></span>
                </div>

                <!-- Destination cards injected by app.js -->
                <div id="destinations-grid" class="destination-grid"></div>

            </div>
        </section>
    </main>

    <!-- Footer injected by app.js -->

    <script src="data/destinations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
