<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Agency | Explore the Unknown</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <main id="main-content">
        <!-- HERO SECTION -->
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Explore the Unknown</h1>
                <p class="hero-subtitle">
                    Journey beyond the edge of known space. From the fiery hearts of nebulas
                    to the silent event horizons of black holes — book your passage to the cosmos.
                </p>
                <a href="destinations.html" class="hero-cta">Begin Your Journey</a>
            </div>
        </section>

        <!-- FEATURED PACKAGES SECTION -->
        <section id="packages" class="section-block">
            <div class="container">
                <h2 class="section-title">Featured Voyages</h2>
                <p class="section-subtitle">Curated expeditions for the daring explorer</p>
                <div id="featured-grid" class="destination-grid">
                    <!-- Packages injected dynamically by app.js -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
